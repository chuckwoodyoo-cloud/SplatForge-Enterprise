<!DOCTYPE html>
<html>
    <head>
        <title>SplatForge Enterprise</title>
        <meta charset="utf-8" />
        <base href="__BASE_HREF__">
        <link rel="manifest" href="./manifest.json">
        <link rel="stylesheet" href="./index.css">
        <link rel="shortcut icon" href="#">
        <meta name="description" content="SplatForge Enterprise is a browser-based Gaussian Splatting workstation for inspection, optimization, recording, and delivery workflows." />
        <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />

        <!-- Service worker -->
        <script>
            const sw = navigator.serviceWorker;
            if (sw) {
                const isLocal = ['localhost', '127.0.0.1', '::1'].includes(window.location.hostname);
                if (isLocal) {
                    sw.getRegistrations()
                        .then(registrations => registrations.forEach(reg => reg.unregister()))
                        .catch(err => console.log('failed to unregister service worker', err));

                    if (window.caches) {
                        caches.keys()
                            .then(keys => keys.filter(key => key.startsWith('superSplat-')).forEach(key => caches.delete(key)))
                            .catch(err => console.log('failed to clear service worker caches', err));
                    }
                } else {
                    sw.register('./sw.js')
                        .then(reg => console.log('service worker registered', reg))
                        .catch(err => console.log('failed to register service worker', err));
                }
            }
        </script>
    </head>

    <body>
        <script type="module" src="./index.js"></script>
    </body>
</html>
